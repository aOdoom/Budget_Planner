<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Budget Planner</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #F2EBE0;
      --surface:   #EAE0CE;
      --card:      #E2D5BE;
      --border:    #C9B99A;
      --accent:    #8B6340;
      --accent2:   #5C7A52;
      --text:      #2C1F0E;
      --muted:     #7A6249;
      --danger:    #A0391A;
      --gold:      #B8892A;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    .wrap {
      position: relative;
      z-index: 1;
      max-width: 680px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 4rem;
    }

    .page-header {
      margin-bottom: 2rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 1.25rem;
    }

    .page-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.9rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.2;
      margin-bottom: 4px;
    }

    .page-header p {
      font-size: 13px;
      color: var(--muted);
      font-weight: 300;
    }

    .income-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 1.5rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px;
    }

    .income-row label {
      font-size: 13px;
      color: var(--muted);
      white-space: nowrap;
      font-weight: 400;
    }

    .income-prefix {
      font-size: 20px;
      font-weight: 500;
      color: var(--accent);
      margin-left: -5px;
      margin-right: -12px;
      font-family: 'Playfair Display', serif;
    }

    .income-row input[type=number] {
      flex: 1;
      border: none;
      background: transparent;
      font-size: 20px;
      font-weight: 500;
      color: var(--text);
      font-family: 'Playfair Display', serif;
      outline: none;
      min-width: 0;
    }

    .income-row input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }

    .summary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 1.25rem;
    }

    .metric {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      transition: background 0.2s;
    }

    .metric .mlabel {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 4px;
      font-weight: 500;
    }

    .metric .mval {
      font-size: 1.4rem;
      font-weight: 500;
      font-family: 'Playfair Display', serif;
      color: var(--text);
    }

    .mval.pos { color: var(--accent2); }
    .mval.neg { color: var(--danger); }

    .bar-wrap { margin-bottom: 1rem; }

    .bar-labels {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 5px;
    }

    .bar-track {
      height: 6px;
      background: var(--card);
      border-radius: 3px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.25s ease, background 0.25s ease;
      background: var(--accent2);
    }

    .bar-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 8px;
      margin-bottom: 10px;
    }

    .section-label {
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding-left: 2px;
    }

    .categories { display: flex; flex-direction: column; gap: 6px; margin-bottom: 1rem; }

    .cat-row {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      transition: border-color 0.15s;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

    .cat-row:hover { border-color: var(--accent); }

    .cat-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .cat-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      background: var(--accent);
    }

    .cat-name-input {
      flex: 1;
      border: none;
      background: transparent;
      color: var(--text);
      font-size: 14px;
      font-weight: 500;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      border-bottom: 1px solid transparent;
      padding-bottom: 1px;
      transition: border-color 0.15s;
      min-width: 0;
    }

    .cat-name-input:focus { border-bottom-color: var(--accent); }

    .cat-val {
      font-size: 14px;
      font-weight: 500;
      font-family: 'Playfair Display', serif;
      color: var(--accent);
      min-width: 64px;
      text-align: right;
      flex-shrink: 0;
    }

    .remove-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--border);
      font-size: 18px;
      line-height: 1;
      padding: 0 2px;
      transition: color 0.15s;
      flex-shrink: 0;
    }

    .remove-btn:hover { color: var(--danger); }

    input[type=range] {
      width: 100%;
      height: 4px;
      -webkit-appearance: none;
      appearance: none;
      background: var(--card);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
      margin-bottom: 6px;
      border: 1px solid var(--border);
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--accent);
      border: 2px solid var(--bg);
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
      transition: transform 0.1s;
    }

    input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.2); }
    input[type=range]::-moz-range-thumb {
      width: 16px; height: 16px; border-radius: 50%;
      background: var(--accent); border: 2px solid var(--bg);
      box-shadow: 0 1px 4px rgba(0,0,0,0.2); cursor: pointer;
    }


    .cat-val-input {
      width: 72px;
      text-align: right;
      border: none;
      border-bottom: 1px solid transparent;
      background: transparent;
      font-size: 14px;
      font-weight: 500;
      font-family: 'Playfair Display', serif;
      color: var(--accent);
      outline: none;
      transition: border-color 0.15s;
      flex-shrink: 0;
    }

    .cat-val-input:focus { border-bottom-color: var(--accent); }




    .cat-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 11px;
      color: var(--muted);
    }

    .cat-footer input[type=number] {
      width: 64px;
      font-size: 11px;
      border: none;
      border-bottom: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      outline: none;
      padding: 0 0 1px;
      text-align: right;
    }

    .add-row {
      display: flex;
      gap: 8px;
      margin-top: 4px;
    }

    .add-row input[type=text] {
      flex: 1;
      padding: 10px 14px;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface);
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }

    .add-row input[type=text]::placeholder { color: var(--muted); }
    .add-row input[type=text]:focus { border-color: var(--accent); }

    .add-btn {
      padding: 10px 18px;
      font-size: 13px;
      font-weight: 500;
      font-family: 'DM Sans', sans-serif;
      border: 1px solid var(--accent);
      border-radius: 10px;
      background: var(--accent);
      color: #FAF5EE;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      white-space: nowrap;
    }

    .add-btn:hover { background: #7A5535; }
    .add-btn:active { transform: scale(0.97); }

    .reset-row {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 1.5rem;
    }

    .reset-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 4px 12px;
      font-size: 11px;
      font-family: 'DM Sans', sans-serif;
      color: var(--muted);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
      line-height: 1.4;
    }

    .reset-btn:hover { border-color: var(--accent); color: var(--accent); }

    .pdf-btn {
      background: var(--accent);
      border: 1px solid var(--accent);
      border-radius: 8px;
      padding: 4px 12px;
      font-size: 11px;
      font-family: 'DM Sans', sans-serif;
      color: #FAF5EE;
      cursor: pointer;
      transition: background 0.15s;
      line-height: 1.4;
    }

    .pdf-btn:hover { background: #7A5535; }

    @media (max-width: 480px) {
      .summary { grid-template-columns: 1fr 1fr; }
      .wrap { padding: 1.5rem 1rem 3rem; }
    }
  </style>
</head>
<body>
  <div class="wrap">

    <div class="page-header">
      <h1>Budget Planner</h1>
      <p>Let's destress your life! 🥳</p>
    </div>

    <div class="income-row">
      <label>Enter monthly income here:</label>
      <span class="income-prefix">$</span>
      <input type="number" id="total-input" inputmode = "decimal" pattern="[0-9]*" value="3000" min="0" step="50">
    </div>

    <div class="summary">
      <div class="metric">
        <div class="mlabel">Income</div>
        <div class="mval" id="s-total">$3,000</div>
      </div>
      <div class="metric">
        <div class="mlabel">Allocated</div>
        <div class="mval" id="s-alloc">$0</div>
      </div>
      <div class="metric">
        <div class="mlabel">Remaining</div>
        <div class="mval pos" id="s-remain">$3,000</div>
      </div>
    </div>

    <div class="bar-wrap">
      <div class="bar-labels">
        <span>0%</span>
        <span id="bar-pct">0% allocated</span>
        <span>100%</span>
      </div>
      <div class="bar-track">
        <div class="bar-fill" id="bar-fill" style="width:0%"></div>
      </div>
      <div class="bar-footer">
        <div class="section-label">Monthly expenses</div>
        <button class="reset-btn" onclick="resetAll()">Reset all sliders</button>
      </div>
    </div>

    <div class="categories" id="cat-list"></div>


    <div class="add-row">
      <input type="text" id="new-cat-name" placeholder="Add a category…">
      <button class="add-btn" onclick="addCategory()">+ Add</button>
    </div>

    <div class="reset-row">
      <button class="reset-btn" onclick="resetAll()">Reset all sliders</button>
      <button class="pdf-btn" onclick="exportPDF()">Export to PDF</button>
    </div>

  </div>

  <script>
    const defaults = [
      { name: 'Tithe',                 value: 0,  max: 1200 },
      { name: 'Savings',               value: 0,  max: 1200 },
      { name: 'Student loans',         value: 0,  max: 1200 },
      { name: 'Rent',                  value: 0,  max: 1200 },
      { name: 'Water',                 value: 0,  max: 1200 },
      { name: 'Gas',                   value: 0,  max: 1200 },
      { name: 'Electric',              value: 0,  max: 1200 },
      { name: 'Wifi',                  value: 0,  max: 1200 },
      { name: 'Groceries',             value: 0,  max: 1200 },
      { name: 'Parking',               value: 0,  max: 1200 },
      { name: 'Car insurance',         value: 0,  max: 1200 },
      { name: 'Gas (car)',             value: 0,  max: 1200 },
      { name: 'Netflix',               value: 0,  max: 1200 },
      { name: 'Spotify',               value: 0,  max: 1200 },
      { name: 'Credit card payments',  value: 0,  max: 1200 },
    ];

    const dotColors = ['#8B6340','#5C7A52','#B8892A','#8B6340','#5C7A52','#7A5535','#4A6741','#C9A86C','#8B6340','#5C7A52','#B8892A','#8B6340','#5C7A52','#7A5535','#4A6741'];

    let total = 3000;
    let categories = defaults.map((c, i) => ({ ...c, id: i, color: dotColors[i % dotColors.length] }));
    let nextId = categories.length;

    function fmt(n) {
      return '$' + n.toLocaleString();
    }

    function render() {
      const list = document.getElementById('cat-list');
      list.innerHTML = '';
      categories.forEach((cat) => {
        const row = document.createElement('div');
        row.className = 'cat-row';
        row.innerHTML = `
          <div class="cat-top">
            <div class="cat-dot" style="background:${cat.color}"></div>
            <input class="cat-name-input" value="${cat.name}" onchange="renameCategory(${cat.id}, this.value)" title="Click to rename">
            <input type="number" class="cat-val-input" id="val-${cat.id}"
              inputmode = "decimal" pattern = "[0-9]*" 
              value="${cat.value}" min="0" max="${cat.max}"
              onchange="updateValue(${cat.id}, +this.value)">
            <button class="remove-btn" onclick="removeCategory(${cat.id})" title="Remove">×</button>
          </div>
          <input type="range" min="0" max="${cat.max}" step="1" value="${cat.value}"
            oninput="updateValue(${cat.id}, +this.value)">
          <div class="cat-footer">
            <span>Slider max:</span>
            <input type="number" value="${cat.max}" min="1" step="50"
              onchange="updateMax(${cat.id}, +this.value)">
          </div>
        `;
        list.appendChild(row);
      });
      updateSummary();
    }

    function updateValue(id, val) {
      const cat = categories.find(c => c.id === id);
      if (cat) cat.value = val;
      const el = document.getElementById('val-' + id);
      if (el) el.value = val;
      const slider = document.querySelector(`input[type=range][oninput*="${id}"]`);
      if (slider) slider.value = val;
      updateSummary();
    }

    function renameCategory(id, name) {
      const cat = categories.find(c => c.id === id);
      if (cat) cat.name = name;
    }

    function updateMax(id, max) {
      const cat = categories.find(c => c.id === id);
      if (!cat || max < 1) return;
      cat.max = max;
      if (cat.value > max) cat.value = max;
      render();
    }

    function removeCategory(id) {
      categories = categories.filter(c => c.id !== id);
      render();
    }

    function addCategory() {
      const inp = document.getElementById('new-cat-name');
      const name = inp.value.trim();
      if (!name) return;
      const color = dotColors[nextId % dotColors.length];
      categories.push({ id: nextId++, name, value: 0, max: 1200, color });
      inp.value = '';
      render();
      document.getElementById('cat-list').lastElementChild?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function resetAll() {
      categories.forEach(c => c.value = 0);
      render();
    }

    document.getElementById('new-cat-name').addEventListener('keydown', e => {
      if (e.key === 'Enter') addCategory();
    });

    document.getElementById('total-input').addEventListener('input', function() {
      total = Math.max(0, +this.value || 0);
      updateSummary();
    });

    function updateSummary() {
      const alloc = categories.reduce((s, c) => s + c.value, 0);
      const remain = total - alloc;
      const pct = total > 0 ? Math.min(100, (alloc / total) * 100) : 0;

      document.getElementById('s-total').textContent = fmt(total);
      document.getElementById('s-alloc').textContent = fmt(alloc);

      const remEl = document.getElementById('s-remain');
      remEl.textContent = fmt(remain);
      remEl.className = 'mval ' + (remain >= 0 ? 'pos' : 'neg');

      document.getElementById('bar-pct').textContent = Math.round(pct) + '% allocated';

      const fill = document.getElementById('bar-fill');
      fill.style.width = pct + '%';
      fill.style.background = remain < 0 ? '#A0391A' : pct > 90 ? '#B8892A' : '#5C7A52';
    }

    // ── EXPORT TO PDF ──────────────────────────────────────────────
    function exportPDF() {
      const alloc = categories.reduce((s, c) => s + c.value, 0);
      const remain = total - alloc;
      const pct = total > 0 ? Math.min(100, (alloc / total) * 100) : 0;

      // Determine bar color matching the live page logic
      const barColor = remain < 0 ? '#A0391A' : pct > 90 ? '#B8892A' : '#5C7A52';

      // Build table rows — only include categories with a value > 0
      const rows = categories
      .filter(c => c.value > 0)
      .map(c => `
          <tr>
            <td class="cat-cell">
              <span class="dot" style="background:${c.color}"></span>
              ${c.name}
            </td>
            <td class="amt-cell">${fmt(c.value)}</td>
          </tr>
      `).join('');

      

      const html = `
        <!DOCTYPE html>
        <html>
        <head>
          <meta charset="UTF-8">
          <title>Budget Planner Export</title>
          <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
          <style>
            * { box-sizing: border-box; margin: 0; padding: 0; }
            body {
              font-family: 'DM Sans', sans-serif;
              background: #F2EBE0;
              color: #2C1F0E;
              padding: 2rem;
            }

            /* Title */
            .title {
              font-family: 'Playfair Display', serif;
              font-size: 1.6rem;
              font-weight: 600;
              color: #2C1F0E;
              margin-bottom: 2px;
            }
            .subtitle {
              font-size: 12px;
              color: #7A6249;
              margin-bottom: 1.5rem;
            }

            /* Summary strip */
            .summary-strip {
              display: flex;
              gap: 8px;
              margin-bottom: 1rem;
            }
            .strip-card {
              flex: 1;
              background: #EAE0CE;
              border: 1px solid #C9B99A;
              border-radius: 8px;
              padding: 8px 12px;
            }
            .strip-label {
              font-size: 10px;
              text-transform: uppercase;
              letter-spacing: 0.06em;
              color: #7A6249;
              margin-bottom: 3px;
            }
            .strip-val {
              font-family: 'Playfair Display', serif;
              font-size: 1.2rem;
              font-weight: 500;
              color: #2C1F0E;
            }
            .strip-val.pos { color: #5C7A52; }
            .strip-val.neg { color: #A0391A; }

            /* Allocation bar */
            .bar-section { margin-bottom: 1.25rem; }
            .bar-labels {
              display: flex;
              justify-content: space-between;
              font-size: 10px;
              color: #7A6249;
              margin-bottom: 4px;
            }
            .bar-track {
              height: 8px;
              background: #E2D5BE;
              border-radius: 4px;
              border: 1px solid #C9B99A;
              overflow: hidden;
            }
            .bar-fill {
              height: 100%;
              border-radius: 4px;
              background: ${barColor};
              width: ${Math.min(100, pct).toFixed(1)}%;
              -webkit-print-color-adjust: exact;
              print-color-adjust: exact;
            }

            /* Table */
            table {
              width: 100%;
              border-collapse: collapse;
              font-size: 13px;
            }
            thead tr {
              background: #2C1F0E;
              color: #F2EBE0;
              -webkit-print-color-adjust: exact;
              print-color-adjust: exact;
            }
            thead th {
              padding: 8px 12px;
              text-align: left;
              font-size: 11px;
              font-weight: 500;
              text-transform: uppercase;
              letter-spacing: 0.05em;
            }
            thead th.amt-head { text-align: right; }

            tbody tr { border-bottom: 1px solid #C9B99A; }
            tbody tr:nth-child(even) { background: #EAE0CE; }
            tbody tr:nth-child(odd)  { background: #F2EBE0; }

            td { padding: 9px 12px; vertical-align: middle; }
            .cat-cell {
              display: flex;
              align-items: center;
              gap: 8px;
            }
            .dot {
              width: 7px;
              height: 7px;
              border-radius: 50%;
              flex-shrink: 0;
              display: inline-block;
              -webkit-print-color-adjust: exact;
              print-color-adjust: exact;
            }
            .amt-cell {
              text-align: right;
              font-family: 'Playfair Display', serif;
              font-weight: 500;
              color: #8B6340;
            }


            /* Footer */
            .footer {
              margin-top: 1rem;
              font-size: 10px;
              color: #7A6249;
              text-align: right;
            }

            @media print {
              body { padding: 1rem; }
              -webkit-print-color-adjust: exact !important;
              print-color-adjust: exact !important;
            }
          </style>
        </head>
        <body>
          <div class="title">Budget Planner</div>
          <div class="subtitle">Monthly Budget Summary</div>

          <div class="summary-strip">
            <div class="strip-card">
              <div class="strip-label">Income</div>
              <div class="strip-val">${fmt(total)}</div>
            </div>
            <div class="strip-card">
              <div class="strip-label">Allocated</div>
              <div class="strip-val">${fmt(alloc)}</div>
            </div>
            <div class="strip-card">
              <div class="strip-label">Remaining</div>
              <div class="strip-val ${remain >= 0 ? 'pos' : 'neg'}">${fmt(remain)}</div>
            </div>
          </div>

          <div class="bar-section">
            <div class="bar-labels">
              <span>0%</span>
              <span>${Math.round(pct)}% allocated</span>
              <span>100%</span>
            </div>
            <div class="bar-track">
              <div class="bar-fill"></div>
            </div>
          </div>

          <table>
            <thead>
              <tr>
                <th>Category</th>
                <th class="amt-head">Amount</th>
              </tr>
            </thead>
            <tbody>
              ${rows}
            </tbody>
          </table>

          <div class="footer">  ©️aOdoom, MPH</div>

          <script>window.onload = function() { window.print(); }<\/script>
        </body>
        </html>
      `;

      // Open in new window and trigger print
      const win = window.open('', '_blank');
      win.document.write(html);
      win.document.close();
    }
    // ── END EXPORT TO PDF ──────────────────────────────────────────

    render();
  </script>
